apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  namespace: microservices
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: "/$1"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - host: micro.local
    http:
      paths:
      - path: /api/users(?:/(.*))?
        pathType: ImplementationSpecific
        backend:
          service:
            name: user-service
            port:
              number: 3000
      - path: /api/products(?:/(.*))?
        pathType: ImplementationSpecific
        backend:
          service:
            name: product-service
            port:
              number: 3001
      - path: /api/orders(?:/(.*))?
        pathType: ImplementationSpecific
        backend:
          service:
            name: order-service
            port:
              number: 3002
      - path: /(?:/(.*))?
        pathType: ImplementationSpecific
        backend:
          service:
            name: gateway-service
            port:
              number: 3003
